services:
  - type: web
    name: processiq-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: node dist/server.js
    healthCheckPath: /health
    autoDeploy: false
    envVars:
      - key: PORT
        value: 3000
      - key: MONGODB_URI
        sync: false
      - key: REDIS_HOST
        fromService:
          type: redis
          name: processiq-redis
          property: host
      - key: REDIS_URL
        fromService:
          type: redis
          name: processiq-redis
          property: connectionString
      - key: REDIS_PORT
        fromService:
          type: redis
          name: processiq-redis
          property: port
      - key: REDIS_PASSWORD
        fromService:
          type: redis
          name: processiq-redis
          property: password
      - key: DOCUMENT_CONCURRENCY
        value: 25
      - key: PDF_WORKER_THREADS
        value: 4
      - key: PDF_RENDER_TIMEOUT_MS
        value: 5000
      - key: JOB_ATTEMPTS
        value: 3
      - key: JOB_BACKOFF_DELAY_MS
        value: 1000
      - key: GRIDFS_BUCKET
        value: generated-documents
      - key: PDF_TEMPLATE_NAME
        value: cerfa
      - key: DOCUSIGN_FAILURE_THRESHOLD
        value: 3
      - key: DOCUSIGN_RESET_TIMEOUT_MS
        value: 10000
      - key: DOCUSIGN_REQUEST_TIMEOUT_MS
        value: 1500
      - key: DOCUSIGN_SIMULATED_LATENCY_MS
        value: 150
      - key: DOCUSIGN_SIMULATED_FAILURE_RATE
        value: 0
      - key: SHUTDOWN_GRACE_PERIOD_MS
        value: 15000

  - type: worker
    name: processiq-worker
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: node dist/worker.js
    autoDeploy: false
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: REDIS_HOST
        fromService:
          type: redis
          name: processiq-redis
          property: host
      - key: REDIS_URL
        fromService:
          type: redis
          name: processiq-redis
          property: connectionString
      - key: REDIS_PORT
        fromService:
          type: redis
          name: processiq-redis
          property: port
      - key: REDIS_PASSWORD
        fromService:
          type: redis
          name: processiq-redis
          property: password
      - key: DOCUMENT_CONCURRENCY
        value: 25
      - key: PDF_WORKER_THREADS
        value: 4
      - key: PDF_RENDER_TIMEOUT_MS
        value: 5000
      - key: JOB_ATTEMPTS
        value: 3
      - key: JOB_BACKOFF_DELAY_MS
        value: 1000
      - key: GRIDFS_BUCKET
        value: generated-documents
      - key: PDF_TEMPLATE_NAME
        value: cerfa
      - key: DOCUSIGN_FAILURE_THRESHOLD
        value: 3
      - key: DOCUSIGN_RESET_TIMEOUT_MS
        value: 10000
      - key: DOCUSIGN_REQUEST_TIMEOUT_MS
        value: 1500
      - key: DOCUSIGN_SIMULATED_LATENCY_MS
        value: 150
      - key: DOCUSIGN_SIMULATED_FAILURE_RATE
        value: 0
      - key: SHUTDOWN_GRACE_PERIOD_MS
        value: 15000

  - type: redis
    name: processiq-redis
    ipAllowList: []
